<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>تجهيز الرابط 2</title>
    <style>
        body { background: #0a0e14; color: #fff; text-align: center; padding: 40px; }
        .box { background: #151b23; padding: 30px; border-radius: 10px; }
        #timer { font-size: 30px; color: #00bfff; }
        .btn { display: inline-block; background: #333; padding: 10px 20px; text-decoration: none; color: #666; pointer-events: none; }
        .btn.active { background: #00ff66; color: #000; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h2>جاهز للتحميل</h2>
        <div id="timer">10</div>
        <a href="رابط_الميديا_فاير_الخاص_بك" id="final-btn" class="btn">اضغط للتحميل من MediaFire</a>
    </div>
    <script>
        let count = 10;
        const timer = document.getElementById('timer');
        const btn = document.getElementById('final-btn');
        setInterval(() => {
            count--; timer.textContent = count;
            if(count <= 0) { btn.textContent = 'الآن تحميل المود'; btn.classList.add('active'); }
        }, 1000);
    </script>
</body>
</html>
